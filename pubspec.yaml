name: savant
description: "Günlük genel kültür kartlarıyla spaced repetition tabanlı öğrenme uygulaması."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Local database (cards, user_progress, streak_log)
  sqflite: ^2.4.1
  path: ^1.9.0

  # Bildirimler (günlük hatırlatma)
  flutter_local_notifications: ^18.0.1

  # İstatistik ekranı grafikleri
  fl_chart: ^0.69.2

  # DB dosya yolu
  path_provider: ^2.1.5

  # Tarih formatlama
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.4.2

flutter:
  uses-material-design: true

  assets:
    - assets/cards.json
